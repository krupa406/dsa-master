<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DSA Master{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="/" class="logo">
      <span class="logo-icon">🧠</span>
      <span class="logo-text">DSA Master</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Dashboard</a>
      <span class="nav-sep">|</span>
      {% for m in modules_nav %}
      <a href="/module/{{ m.id }}" class="nav-link nav-module {% if active_module == m.id %}active{% endif %}"
         title="{{ m.title }}" style="--accent: {{ m.color }}">
        {{ m.icon }}
      </a>
      {% endfor %}
    </div>
  </div>
</nav>

<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
